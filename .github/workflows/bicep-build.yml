name: bicep-build

on:
  push:
    branches: [master]
    paths:
      - "deploy/main.bicep"
      - ".github/workflows/bicep-build.yml"
  pull_request:
    branches: [master]
    paths:
      - "deploy/main.bicep"
      - ".github/workflows/bicep-build.yml"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Install Bicep
        run: |
          curl -sL https://github.com/Azure/bicep/releases/latest/download/bicep-linux-x64 -o /tmp/bicep
          chmod +x /tmp/bicep
          sudo mv /tmp/bicep /usr/local/bin/bicep
          bicep --version

      - name: Build ARM template
        run: bicep build deploy/main.bicep --outfile deploy/azuredeploy.json

      - name: Validate ARM JSON
        run: python -c "import json; json.load(open('deploy/azuredeploy.json'))"

      - name: Commit regenerated azuredeploy.json
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: |
          if [[ -n "$(git status --porcelain deploy/azuredeploy.json)" ]]; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add deploy/azuredeploy.json
            git commit -m "chore: regenerate azuredeploy.json from main.bicep"
            git push
          else
            echo "azuredeploy.json already up to date."
          fi
