# Microsoft Security Copilot **native** plugin manifest (Descriptor + SkillGroups).
#
# This is the format Security Copilot's plugin loader actually supports for
# shared-secret authentication. The OpenAI ai-plugin.json variant in this
# folder is kept for completeness but its auth section is rejected by SC
# ("Unsupported auth type"); use this YAML instead.
#
# Upload steps:
#   1. Sources -> Custom -> Upload plugin
#   2. Plugin type: **Security Copilot plugin** (NOT "OpenAI plugin")
#   3. Upload as link: paste the raw GitHub URL of this file
#       https://raw.githubusercontent.com/NobufumiMurata/copilot-mcp-soc-pack/master/sc-plugin/manifest.yaml
#   4. Add -> Setup -> paste the shared API key (the value of $env:MCP_API_KEY)
#
# The deployed app accepts the same secret via either ``X-API-Key`` (used
# here) or ``Authorization: Bearer`` for non-SC clients.

Descriptor:
  Name: copilot_mcp_soc_pack
  DisplayName: Copilot MCP SOC Pack
  Description: >-
    Free-API SOC enrichment (CISA KEV, FIRST EPSS, MITRE ATT&CK, abuse.ch,
    GreyNoise, AbuseIPDB, crt.sh, ransomware.live) for Microsoft Security
    Copilot.
  DescriptionForModel: |
    Community SOC pack that enriches security investigations using free,
    no-payment APIs. Call these skills whenever a prompt mentions a CVE,
    IP, domain, URL, file hash, ransomware group or victim organisation.

    Skill selection hints:
    - CVE exploitation status: kev_lookup, kev_search (CISA Known
      Exploited Vulnerabilities catalog).
    - CVE exploitation probability: epss_score (FIRST EPSS).
    - MITRE ATT&CK technique lookup or search: attack_technique,
      attack_search.
    - Malware sample, hash or URL analysis: malwarebazaar_lookup /
      malwarebazaar_recent, urlhaus_lookup_url, urlhaus_lookup_host.
    - IOC enrichment for IPs, domains, URLs or hashes tied to active
      campaigns: threatfox_recent, threatfox_search.
    - IP reputation and scanner-noise classification: greynoise_classify,
      abuseipdb_check.
    - Subdomain enumeration and attack-surface discovery for a domain:
      crtsh_subdomains (uses Certificate Transparency logs).
    - Ransomware leak-site activity (victims, groups, country-level
      impact): ransomware_live_recent, ransomware_live_by_group,
      ransomware_live_by_country, ransomware_live_groups.
    - Community threat-intel pulses for any indicator (IP, domain, URL,
      file hash): otx_lookup_ipv4, otx_lookup_ipv6, otx_lookup_domain,
      otx_lookup_file, otx_lookup_url (AlienVault OTX).
    - Public data-breach exposure for an organisation's domain or a
      named breach: hibp_breaches_by_domain, hibp_breach (Have I Been
      Pwned).
    - Open-source software vulnerability lookup by package + version,
      git commit, or vulnerability id (OSV / GHSA / CVE):
      osv_query_package, osv_query_commit, osv_get_vuln (OSV.dev).
    - Known-good file (NSRL whitelist) lookup by MD5 / SHA1 / SHA256:
      circl_hashlookup_md5, circl_hashlookup_sha1,
      circl_hashlookup_sha256 (CIRCL hashlookup). known=false is the
      SOC-actionable signal.
    - Defensive-technique mappings against MITRE ATT&CK (which D3FEND
      defenses counter ATT&CK X, or which ATT&CK techniques a given
      defense covers): d3fend_defenses_for_attack,
      d3fend_attacks_for_defense (MITRE D3FEND).

    Never invent data the tools did not return. Cite the source endpoint
    when presenting results (for example: "per CISA KEV", "per
    ransomware.live").
  SupportedAuthTypes:
    - ApiKey
  Authorization:
    Type: APIKey
    Key: X-API-Key
    Location: Header
    AuthScheme: ''

SkillGroups:
  - Format: API
    Settings:
      # Replace with your own FQDN if you fork. The deployed Container App
      # serves an OpenAPI 3.0.1 spec (downgraded from FastAPI 3.1) at this
      # URL and is gated by the X-API-Key header configured above.
      OpenApiSpecUrl: https://copilot-mcp-soc-pack.salmonsea-6e7f9e16.japaneast.azurecontainerapps.io/openapi.json
